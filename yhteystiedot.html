<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" >
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tassu adoptiopalvelu</title>
    <link rel="stylesheet" href="tyylit/tyylit.css">
  </head>
  <body>
    <header>
      <div class="header-inner">
        <div class="header-left">
          <img class="tassu" src="kuvat/Tassu.png" alt="tassu logo">
          <h1 class="logo dynapuff-title">Pieni tassu, suuri sydän</h1>
        </div>
        <button class="hamburger" id="hamburger" aria-label="Avaa valikko">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>

      <nav id="nav">
        <ul>
          <li><a href="index.html">Etusivu</a></li>
          <li><a href="elaimet.html">Adoptoitavat eläimet</a></li>
          <li><a href="adoptio.html">Adoptioprosessi</a></li>
          <li><a class="active" href="yhteystiedot.html">Yhteystiedot</a></li>
        </ul>
      </nav>
    </header>
    <div class="herocontact"></div>
    <main class="container">
      <section class="layout-contact">
        <h2 class="contact-title">Ota yhteyttä</h2>

        <form class="contact-form">
          <div class="form-group">
            <label for="name">Nimi:</label>
            <input type="text" id="name" name="name" required>
          </div>

          <div class="form-group">
            <label for="email">Sähköpostiosoite:</label>
            <input type="email" id="email" name="email" required>
          </div>

          <div class="form-group">
            <label for="message">Viesti:</label>
            <textarea id="message" name="message" rows="5" required></textarea>
          </div>

          <button type="submit" class="submit-btn">Lähetä viesti</button>
        </form>
        <hr>
        <div class="info">
          <h3 class="yhteys">Yhteystiedot</h3>
          <hr class="hr-info" />
          <p>Tassukuja 1, 020104 Helsinki</p>
          <p>
            <a href="mailto:asiakaspalvelu@tassuadoptio.fi" class="email"
              >asiakaspalvelu@tassuadoptio.fi</a
            >
          </p>
          <p>040 - 1234 567</p>
          <p>Aukioloajat: 12 - 20</p>
          <hr class="hr-info">
        </div>
      </section>
    </main>

    <footer>
      <div class="footer-info">
        <p>
          <a href="mailto:asiakaspalvelu@tassuadoptio.fi" class="email"
            >asiakaspalvelu@tassuadoptio.fi</a
          >
        </p>
        <p>040 - 1234 567</p>
      </div>
    </footer>

    <script>
      const hamburger = document.getElementById('hamburger')
      const nav = document.getElementById('nav')

      hamburger.addEventListener('click', () => {
        nav.classList.toggle('open')
      })
    </script>
  </body>
</html>
